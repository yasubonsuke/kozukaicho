<body>
<div class="kz">
  <header>
    <div><span class="app-title">小遣い帳</span><span class="app-year">2026年度</span></div>
    <div class="head-right">
      <span class="save-state" id="saveState"></span>
      <button class="help-btn" data-help-open aria-label="使い方">？</button>
    </div>
  </header>
  <div id="bkBanner"></div>
  <main id="mainEl"><div id="view"></div></main>
  <nav>
    <button data-tab="summary">まとめ</button>
    <button data-tab="weekly">週の支出</button>
    <button data-tab="living">生活費</button>
    <button data-tab="income">収入</button>
  </nav>
  <div id="panelRoot"></div>
  <div id="modalRoot"></div>
  <input type="file" id="ocrFile" accept="image/*" capture="environment" style="display:none">
</div>

<script>
"use strict";

/* PURE-START */
const MONTHS = ["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
const WEEKS  = ["第1週","第2週","第3週","第4週","第5週"];
const FOOD_CATS   = ["食費","外食","日用品","交通費","娯楽・趣味","交際費","その他"];
const LIVING_CATS = ["家賃","電気","ガス","水道","通信費","保険","サブスク","その他"];
const INCOME_CATS = ["給与","賞与","副業・副収入","その他"];

function emptyData(){
  return {
    weekly: MONTHS.map(() => WEEKS.map(() => FOOD_CATS.map(() => []))),
    living: MONTHS.map(() => LIVING_CATS.map(() => [])),
    income: MONTHS.map(() => INCOME_CATS.map(() => []))
  };
}
function clampNum(n){
  if (!isFinite(n)) n = 0;
  n = Math.round(n);
  return Math.min(999999999, Math.max(0, n));
}
function cleanEntry(e){
  const o = e || {};
  const out = { a: clampNum(+o.a || 0), n: String(o.n || "").slice(0, 40) };
  const d = String(o.d || "");
  if (/^20[0-9]{2}-[0-9]{2}-[0-9]{2}$/.test(d)) out.d = d;
  return out;
}
function cellSum(arr){ return (arr || []).reduce((s, e) => s + (+e.a || 0), 0); }
function numToEntries(n){
  n = clampNum(+n || 0);
  return n ? [{ a: n, n: "" }] : [];
}
function migrateV1(d){
  const s = emptyData();
  MONTHS.forEach((_, m) => {
    WEEKS.forEach((_, w) => FOOD_CATS.forEach((_, c) => {
      s.weekly[m][w][c] = numToEntries((((d.weekly || [])[m] || [])[w] || [])[c]);
    }));
    LIVING_CATS.forEach((_, c) => { s.living[m][c] = numToEntries(((d.living || [])[m] || [])[c]); });
    INCOME_CATS.forEach((_, c) => { s.income[m][c] = numToEntries(((d.income || [])[m] || [])[c]); });
  });
  return s;
}
function normalizeV2(d){
  const s = emptyData();
  const list = a => Array.isArray(a) ? a.map(cleanEntry).filter(e => e.a > 0 || e.n) : [];
  MONTHS.forEach((_, m) => {
    WEEKS.forEach((_, w) => FOOD_CATS.forEach((_, c) => {
      s.weekly[m][w][c] = list((((d.weekly || [])[m] || [])[w] || [])[c]);
    }));
    LIVING_CATS.forEach((_, c) => { s.living[m][c] = list(((d.living || [])[m] || [])[c]); });
    INCOME_CATS.forEach((_, c) => { s.income[m][c] = list(((d.income || [])[m] || [])[c]); });
  });
  return s;
}
const weekTotal   = (d, m, w) => d.weekly[m][w].reduce((s, arr) => s + cellSum(arr), 0);
const monthFood   = (d, m) => WEEKS.reduce((s, _, w) => s + weekTotal(d, m, w), 0);
const monthLiving = (d, m) => d.living[m].reduce((s, arr) => s + cellSum(arr), 0);
const monthIncome = (d, m) => d.income[m].reduce((s, arr) => s + cellSum(arr), 0);
const monthOut    = (d, m) => monthFood(d, m) + monthLiving(d, m);
const monthBal    = (d, m) => monthIncome(d, m) - monthOut(d, m);
function cumBal(d, m){ let c = 0; for (let i = 0; i <= m; i++) c += monthBal(d, i); return c; }
const yearIncome = d => MONTHS.reduce((s, _, m) => s + monthIncome(d, m), 0);
const yearOut    = d => MONTHS.reduce((s, _, m) => s + monthOut(d, m), 0);
function recentMemos(d, t){
  const out = [];
  const push = arr => (arr || []).forEach(e => { const n = (e.n || "").trim(); if (n) out.push(n); });
  if (t.kind === "weekly") MONTHS.forEach((_, m) => WEEKS.forEach((_, w) => push(d.weekly[m][w][t.c])));
  else if (t.kind === "living") MONTHS.forEach((_, m) => push(d.living[m][t.c]));
  else MONTHS.forEach((_, m) => push(d.income[m][t.c]));
  const uniq = [];
  out.reverse().forEach(n => { if (!uniq.includes(n)) uniq.push(n); });
  return uniq.slice(0, 6);
}
function clampEval(a, op, b){
  let r;
  if (op === "＋") r = a + b;
  else if (op === "−") r = a - b;
  else if (op === "×") r = a * b;
  else r = (b === 0 ? 0 : a / b);
  return clampNum(r);
}
function reduceCalc(c, key){
  if (key === "AC") return { ...c, acc: null, op: null, cur: "0", fresh: true };
  if (key === "⌫") {
    if (c.fresh) return c;
    const s = c.cur.slice(0, -1);
    return { ...c, cur: s.length ? s : "0" };
  }

    if(inc>0) bars+='<rect x="'+(x+3).toFixed(1)+'" y="'+y(inc).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+(H-pb-y(inc)).toFixed(1)+'" fill="'+COL.ai+'"/>';
    if(out>0) bars+='<rect x="'+(x+4+bw).toFixed(1)+'" y="'+y(out).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+(H-pb-y(out)).toFixed(1)+'" fill="'+COL.shu+'"/>';
    labels+='<text x="'+(x+iw/2).toFixed(1)+'" y="'+(H-7)+'" font-size="8.5" fill="'+COL.inkSoft+'" text-anchor="middle">'+mn.replace("月","")+'</text>';
    zones+='<rect class="tap-zone" data-ypick="'+m+'" x="'+x.toFixed(1)+'" y="0" width="'+iw.toFixed(1)+'" height="'+H+'" fill="transparent" pointer-events="all"/>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="月別の収入と支出">'+under+g+
    '<line x1="'+pl+'" y1="'+(H-pb)+'" x2="'+(W-pr)+'" y2="'+(H-pb)+'" stroke="'+COL.ink+'" stroke-width="1"/>'+bars+labels+zones+'</svg>';
}
function weekChartSVG(d, month, week){
  const W=360,H=110,pt=16,pb=20,pl=6,pr=6,iw=(W-pl-pr)/5;
  let maxV=1000;
  WEEKS.forEach((_,w)=>{ maxV=Math.max(maxV, weekTotal(d,month,w)); });
  maxV*=1.15;
  const y=v=>H-pb-(v/maxV)*(H-pt-pb);
  let out="",zones="";
  WEEKS.forEach((wn,w)=>{
    const t=weekTotal(d,month,w);
    const x=pl+iw*w+iw*0.22, bw=iw*0.56;
    if(t>0){
      out+='<rect x="'+x.toFixed(1)+'" y="'+y(t).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+(H-pb-y(t)).toFixed(1)+'" fill="'+(w===week?COL.ai:COL.aiPale)+'"/>';
      out+='<text x="'+(pl+iw*w+iw/2).toFixed(1)+'" y="'+(y(t)-4).toFixed(1)+'" font-size="8.5" fill="'+COL.inkSoft+'" text-anchor="middle">'+fmtN(t)+'</text>';
    }
    out+='<text x="'+(pl+iw*w+iw/2).toFixed(1)+'" y="'+(H-6)+'" font-size="9" fill="'+(w===week?COL.ai:COL.inkSoft)+'" text-anchor="middle">'+wn+'</text>';
    zones+='<rect class="tap-zone" data-wpick="'+w+'" x="'+(pl+iw*w).toFixed(1)+'" y="0" width="'+iw.toFixed(1)+'" height="'+H+'" fill="transparent" pointer-events="all"/>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="週ごとの支出合計">'+
    '<line x1="'+pl+'" y1="'+(H-pb)+'" x2="'+(W-pr)+'" y2="'+(H-pb)+'" stroke="'+COL.ink+'" stroke-width="1"/>'+out+zones+'</svg>';
}
function utilChartSVG(d, pick){
  const W=360,H=120,pt=10,pb=20,pl=6,pr=6;
  const series=[[1,COL.ai],[2,COL.shu],[3,COL.asagi]];
  let maxV=1000;
  MONTHS.forEach((_,m)=>series.forEach(s=>{ maxV=Math.max(maxV, cellSum(d.living[m][s[0]])); }));
  maxV*=1.15;
  const step=(W-pl-pr)/11;
  const xf=m=>pl+step*m;
  const y=v=>H-pb-(v/maxV)*(H-pt-pb);
  let under="";
  if(pick!=null) under='<rect x="'+Math.max(0,xf(pick)-step/2).toFixed(1)+'" y="2" width="'+step.toFixed(1)+'" height="'+(H-pb-2)+'" fill="'+COL.aiSoft+'" rx="3"/>';
  let out="",labels="",zones="";
  series.forEach(s=>{
    const pts=MONTHS.map((_,m)=>xf(m).toFixed(1)+","+y(cellSum(d.living[m][s[0]])).toFixed(1)).join(" ");
    out+='<polyline points="'+pts+'" fill="none" stroke="'+s[1]+'" stroke-width="1.6"/>';
    MONTHS.forEach((_,m)=>{
      const v=cellSum(d.living[m][s[0]]);
      if(v>0) out+='<circle cx="'+xf(m).toFixed(1)+'" cy="'+y(v).toFixed(1)+'" r="2.4" fill="'+s[1]+'"/>';
    });
  });
  MONTHS.forEach((mn,m)=>{
    labels+='<text x="'+xf(m).toFixed(1)+'" y="'+(H-6)+'" font-size="8.5" fill="'+COL.inkSoft+'" text-anchor="middle">'+mn.replace("月","")+'</text>';
    zones+='<rect class="tap-zone" data-upick="'+m+'" x="'+Math.max(0,xf(m)-step/2).toFixed(1)+'" y="0" width="'+step.toFixed(1)+'" height="'+H+'" fill="transparent" pointer-events="all"/>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="光熱費の推移">'+under+
    '<line x1="'+pl+'" y1="'+(H-pb)+'" x2="'+(W-pr)+'" y2="'+(H-pb)+'" stroke="'+COL.ink+'" stroke-width="1"/>'+out+labels+zones+'</svg>';
}

/* ───────── 描画 ───────── */
function viewHTMLFor(tab, m, w){
  const sm = st.month, sw = st.week;
  st.month = m;
  if (w != null) st.week = w;
  const h = tab === "weekly" ? viewWeekly() : tab === "living" ? viewLiving() : viewIncome();
  st.month = sm; st.week = sw;
  return h;
}
function paneHTML(dir){
  if (dir === 0) return viewHTMLFor(st.tab, st.month, st.week);
  if (st.tab === "weekly") {
    const p = nextWeekPos(st.month, st.week, dir);
    return p ? viewHTMLFor("weekly", p.m, p.w) : "";
  }
  const m = st.month + dir;
  return (m >= 0 && m <= 11) ? viewHTMLFor(st.tab, m, null) : "";
}
function centerChips(){
  document.querySelectorAll(".month-scroll").forEach(sc => {
    const on = sc.querySelector(".chip.on");
    if (!on) return;
    try {
      const r = on.getBoundingClientRect(), rc = sc.getBoundingClientRect();
      sc.scrollLeft += (r.left + r.width / 2) - (rc.left + rc.width / 2);
    } catch (e) { /* noop */ }
  });
}
function renderView(){
  const view = document.getElementById("view");
  if (st.tab === "summary") {
    view.innerHTML = viewSummary();
  } else {
    view.innerHTML =
      '<div class="swipe-wrap"><div class="swipe-track" id="swipeTrack">'+
      '<div class="swipe-pane">'+paneHTML(-1)+'</div>'+
      '<div class="swipe-pane" data-cur>'+paneHTML(0)+'</div>'+
      '<div class="swipe-pane">'+paneHTML(1)+'</div>'+
      '</div></div>';
  }
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on", b.dataset.tab===st.tab));
  centerChips();
  updatePad();
}
function renderPanel(){
  document.getElementById("panelRoot").innerHTML=panelHTML();
  updatePad();
}
function renderModal(){
  document.getElementById("modalRoot").innerHTML=modalHTML();
}
function updatePad(){
  const m=document.getElementById("mainEl");
  m.classList.remove("pad-list","pad-calc");
  if(st.panel) m.classList.add(st.panel.mode==="list"?"pad-list":"pad-calc");
}
function scrollActiveRow(){
  try{
    const el=document.querySelector(".rowbtn.act");
    if(el) el.scrollIntoView({block:"center"});
  }catch(e){}
}

  st.flash="";
  ocrToken++; st.ocr={busy:false, msg:""};
  st.panel={t:st.panel.t, mode:"calc", edit:i, memo:e.n||"", acc:null, op:null, cur:String(e.a||0), fresh:true, confirmDel:false, ocrDate:null};
  renderPanel();
}
function backToList(){ ocrToken++; st.ocr={busy:false, msg:""}; st.panel={t:st.panel.t, mode:"list"}; renderPanel(); }
function closePanel(){ ocrToken++; st.ocr={busy:false, msg:""}; st.panel=null; st.flash=""; renderView(); renderPanel(); }

function onCalcKey(key){
  const p=st.panel;
  if(!p || p.mode!=="calc") return;
  if(key==="確定"){
    const v = p.op!=null ? clampEval(p.acc, p.op, Number(p.cur)) : clampNum(Number(p.cur));
    const memo = p.memo.trim().slice(0,40);
    const t=p.t;
    const scanD = p.ocrDate || null;
    if(p.edit==null){
      if(v===0 && !memo){ backToList(); return; }
      commit(t, arr=>{ const e={a:v, n:memo}; if(scanD) e.d=scanD; arr.push(e); });
      showFlash("追加しました");
    }else{
      const idx=p.edit;
      commit(t, arr=>{
        if(arr[idx]){
          const keep = scanD || arr[idx].d;
          const e={a:v, n:memo};
          if(keep) e.d=keep;
          arr[idx]=e;
        }
      });
      showFlash("保存しました");
    }
    st.ocr={busy:false, msg:""};
    st.panel={t, mode:"list"};
    renderView(); renderPanel();
    return;
  }
  st.panel={...p, ...reduceCalc(p, key)};
  renderPanel();
}
function onDelete(){
  const p=st.panel;
  if(!p || p.edit==null) return;
  if(!p.confirmDel){ st.panel={...p, confirmDel:true}; renderPanel(); return; }
  const t=p.t, idx=p.edit;
  commit(t, arr=>arr.splice(idx,1));
  st.panel={t, mode:"list"};
  renderView(); renderPanel();
  showFlash("削除しました");
}

async function doExport(){
  const text=JSON.stringify({v:2, weekly:st.data.weekly, living:st.data.living, income:st.data.income});
  let shared=false;
  try{
    if(navigator.canShare && typeof File!=="undefined"){
      const f=new File([text], "kozukaicho-backup.txt", {type:"text/plain"});
      if(navigator.canShare({files:[f]})){
        await navigator.share({files:[f], title:"小遣い帳バックアップ"});
        shared=true;
      }
    }
  }catch(e){ /* キャンセル・非対応時は下のコピー手段へ */ }
  st.io={mode:"export", text};
  markBackedUp();
  if(shared){
    st.ioMsg="共有しました。「ファイルに保存」やメモに入れておくと安心です";
    renderModal();
    return;
  }
  st.ioMsg="";
  renderModal();
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text)
        .then(()=>{ st.ioMsg="コピーしました。メモアプリなどに貼り付けて保管してください"; renderModal(); })
        .catch(()=>{ st.ioMsg="下のテキストを長押しして全選択→コピーしてください"; renderModal(); });
    }else{
      st.ioMsg="下のテキストを長押しして全選択→コピーしてください";
      renderModal();
    }
  }catch(e){
    st.ioMsg="下のテキストを長押しして全選択→コピーしてください";
    renderModal();
  }
}
function doImport(){
  if(!st.io || st.io.mode!=="import") return;
  try{
    const p=JSON.parse(st.io.text);
    let nd=null;
    if(p && p.v===2) nd=normalizeV2(p);
    else if(p && p.weekly) nd=migrateV1(p);
    if(!nd) throw new Error("bad");
    st.data=nd;
    st.io=null;
    st.ioMsg="読み込みました。今のデータを置き換えています";
    scheduleSave();
    renderView(); renderPanel(); renderModal(); renderBanner();
  }catch(e){
    st.ioMsg="読み込めませんでした。書き出したテキストを丸ごと貼り付けてください";
    renderModal();
  }
}

function ocrRowHTML(){
  let h = '<div class="ocr-row"><button class="ocr-btn" data-ocr'+(st.ocr.busy?' disabled':'')+'>📷 レシート読取</button>'+
    '<span class="ocr-status" id="ocrStatus">'+esc(st.ocr.msg)+'</span></div>';
  if (st.ocr.move && st.panel && st.panel.edit == null) {
    h += '<div class="ocr-move-wrap"><button class="ocr-move" data-ocr-move>📅 記録先を '+esc(st.ocr.move.label)+' に変更する</button></div>';
  }
  return h;
}
function ocrStatus(msg){
  st.ocr.msg = msg;
  const el = document.getElementById("ocrStatus");
  if (el) el.textContent = msg;
}
function loadTesseract(){
  return new Promise((res, rej) => {
    if (window.Tesseract) return res();
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js";
    s.onload = () => res();
    s.onerror = () => rej(new Error("script"));
    document.head.appendChild(s);
  });
}
function ocrJpStatus(m){
  if (!m || !m.status) return "";
  const p = (m.progress != null) ? " " + Math.round(m.progress * 100) + "%" : "";
  if (m.status.indexOf("recognizing") === 0) return "解析中…" + p;
  if (m.status.indexOf("loading language") === 0) return "日本語データ取得中（初回のみ・約15MB）…" + p;
  if (m.status.indexOf("loading tesseract") === 0 || m.status.indexOf("initializing") === 0) return "読み取りエンジン準備中…";
  return "";
}
async function getOcrWorker(){
  await loadTesseract();
  if (ocrWorker) return ocrWorker;
  ocrWorker = await Tesseract.createWorker("jpn", 1, {
    logger: m => { const t = ocrJpStatus(m); if (t) ocrStatus(t); }
  });
  await ocrWorker.setParameters({ tessedit_pageseg_mode: "4", preserve_interword_spaces: "1" });
  return ocrWorker;
}
function loadImageCanvas(file, maxSide){
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        const sc = Math.min(1, maxSide / Math.max(img.width, img.height));
        const w = Math.max(1, Math.round(img.width * sc));
        const h = Math.max(1, Math.round(img.height * sc));
        const cv = document.createElement("canvas");
        cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        res(cv);
      } catch (e) { rej(e); }
    };
    img.onerror = rej;
    img.src = url;
  });
}
function canvasGray(cv){
  const im = cv.getContext("2d").getImageData(0, 0, cv.width, cv.height);
  const d = im.data;
  const g = new Uint8ClampedArray(cv.width * cv.height);
  for (let i = 0, j = 0; i < d.length; i += 4, j++) {
    g[j] = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
  }
  return g;
}
async function preprocessReceipt(file, winDiv, targetW){
  const cv = await loadImageCanvas(file, 2600);
  let g = canvasGray(cv);
  const crop = findBrightCrop(g, cv.width, cv.height);
  let sx = 0, sy = 0, sw = cv.width, sh = cv.height;
  if (crop) { sx = crop.x; sy = crop.y; sw = crop.w; sh = crop.h; }
  const tw = targetW || 1150;
  let scale = tw / sw;
  if (sh * scale > 3600) scale = 3600 / sh;
  if (scale > 2) scale = 2;
  const w = Math.max(1, Math.round(sw * scale));
  const h = Math.max(1, Math.round(sh * scale));
  const out = document.createElement("canvas");
  out.width = w; out.height = h;
  const cx = out.getContext("2d");
  cx.drawImage(cv, sx, sy, sw, sh, 0, 0, w, h);
  g = canvasGray(out);
  g = sharpenGray(g, w, h);
  const bin = despeckle(stripLongRuns(adaptiveBinarize(g, w, h, winDiv), w, h), w, h);
  const im = cx.createImageData(w, h);
  for (let j = 0, i = 0; j < bin.length; j++, i += 4) {
    im.data[i] = im.data[i + 1] = im.data[i + 2] = bin[j];
    im.data[i + 3] = 255;
  }
  cx.putImageData(im, 0, 0);
  return out;
}
async function ocrExtract(worker, cv, token){
  ocrStatus("解析中…");
  const r = await worker.recognize(cv);
  if (token !== ocrToken) return { txt: "", amount: 0 };
  const txt = r && r.data ? r.data.text : "";
  const lines = (r && r.data && r.data.lines) ? r.data.lines : [];
  let amount = 0;
  const texts = lines.map(l => ((l.confidence == null || l.confidence >= 35) ? l.text : ""));
  const hit = findTotalLineIndex(texts);
  if (hit && lines[hit.i]) {
    const lineNums = numsOnTotalLine(lines[hit.i].text);
    const nextNums = lines[hit.i + 1] ? numsOnTotalLine(lines[hit.i + 1].text) : [];
    const passNums = lineNums.length ? lineNums : nextNums;
    if (passNums.length) {
      amount = Math.max.apply(null, passNums);
    } else if (lines[hit.i].bbox) {
      try {
        ocrStatus("合計を精読中…");
        await worker.setParameters({ tessedit_char_whitelist: "0123456789,.-¥", tessedit_pageseg_mode: "7" });
        const mk = ln => {
          const b = ln.bbox;
          const left = Math.max(0, b.x0 - 6), top = Math.max(0, b.y0 - 5);
          return { left: left, top: top,
            width: Math.min(cv.width, b.x1 + 6) - left,
            height: Math.min(cv.height, b.y1 + 5) - top };
        };
        const rects = [mk(lines[hit.i])];
        if (lines[hit.i + 1] && lines[hit.i + 1].bbox) rects.push(mk(lines[hit.i + 1]));
        for (let k = 0; k < rects.length && !amount; k++) {
          if (rects[k].width < 8 || rects[k].height < 6) continue;
          if (token !== ocrToken) break;
          const r2 = await worker.recognize(cv, { rectangle: rects[k] });
          amount = bestNumberFromDigits(r2 && r2.data ? r2.data.text : "");
        }
        await worker.setParameters({ tessedit_char_whitelist: "", tessedit_pageseg_mode: "4" });
      } catch (e2) {
        try { await worker.setParameters({ tessedit_char_whitelist: "", tessedit_pageseg_mode: "4" }); } catch (e3) { /* noop */ }
      }
    }
  }
  return { txt: txt, amount: amount };
}
async function runOcr(file){
  if (!st.panel || st.panel.mode !== "calc") return;
  const token = ++ocrToken;
  st.ocr = { busy: true, msg: "写真を準備中…" };
  renderPanel();
  try {
    const cv = await preprocessReceipt(file);
    if (token !== ocrToken) return;
    const worker = await getOcrWorker();
    if (token !== ocrToken) return;
    let res = await ocrExtract(worker, cv, token);
    if (token !== ocrToken || !st.panel || st.panel.mode !== "calc") return;
    if (!res.amount) {
      ocrStatus("別方式で再解析中…");
      const cv2 = await preprocessReceipt(file, 32);
      if (token !== ocrToken) return;
      const res2 = await ocrExtract(worker, cv2, token);
      if (token !== ocrToken || !st.panel || st.panel.mode !== "calc") return;
      if (res2.amount > 0 || (!res.txt.trim() && res2.txt.trim())) res = res2;
    }
    if (!res.amount) {
      ocrStatus("高精細で再解析中…");
      const cv3 = await preprocessReceipt(file, 22, 1400);
      if (token !== ocrToken) return;
      const res3 = await ocrExtract(worker, cv3, token);
      if (token !== ocrToken || !st.panel || st.panel.mode !== "calc") return;
      if (res3.amount > 0 || (!res.txt.trim() && res3.txt.trim())) res = res3;
    }
    const txt = res.txt;
    let amount = res.amount;
    if (token !== ocrToken || !st.panel || st.panel.mode !== "calc") return;
    const parsed = parseReceiptText(txt);
    if (amount > 0) parsed.amount = clampNum(amount);
    const pd = parseReceiptDate(txt);
    if (parsed.amount > 0) {
      st.panel.cur = String(parsed.amount);
      st.panel.fresh = true;
      st.panel.acc = null;
      st.panel.op = null;
    }
    if (pd) st.panel.ocrDate = pd.iso;
    let move = null;
    if (pd && st.panel.edit == null) {
      const f = dateToFiscal(pd.y, pd.mo, pd.da);
      if (f) {
        const cur = st.panel.t;
        if (cur.kind === "weekly" && (f.m !== cur.m || f.w !== cur.w)) {
          move = { t: { kind: "weekly", m: f.m, w: f.w, c: cur.c }, label: MONTHS[f.m] + " " + WEEKS[f.w] };
        } else if ((cur.kind === "living" || cur.kind === "income") && f.m !== cur.m) {
          move = { t: { kind: cur.kind, m: f.m, c: cur.c }, label: MONTHS[f.m] };
        }
      }
    }
    const dstr = pd ? "　日付 " + pd.mo + "/" + pd.da : "";
    st.ocr = {
      busy: false,
      move: move,
      msg: parsed.amount > 0
        ? "読み取り: ¥" + fmtN(parsed.amount) + dstr + "　違っていたら直してください"
        : "金額を読み取れませんでした。手で入力してください" + dstr
    };
    renderPanel();
  } catch (e) {
    if (token !== ocrToken) return;
    st.ocr = { busy: false, msg: "読み取りに失敗しました。初回は通信が必要です" };
    renderPanel();
  }
}

      const raw=localStorage.getItem(SNAP_KEY);
      if(raw){

        if(p && p.v===2) st.data=normalizeV2(p);
        else if(p && p.weekly) st.data=migrateV1(p);

});

/* ───────── スワイプで週・月を移動（指に追従） ───────── */
let drag = null;
let suppressClick = false;
function periodExists(dir){
  if (st.tab === "weekly") return !!nextWeekPos(st.month, st.week, dir);
  const m = st.month + dir;
  return m >= 0 && m <= 11;
}
function applyPeriod(dir){
  if (st.tab === "weekly") {
    const p = nextWeekPos(st.month, st.week, dir);
    if (p) { st.month = p.m; st.week = p.w; }
  } else {
    const m = st.month + dir;
    if (m >= 0 && m <= 11) st.month = m;
  }
  renderView();
}
function swipeTrackEl(){ return document.getElementById("swipeTrack"); }
document.getElementById("mainEl").addEventListener("touchstart", ev => {
  drag = null;
  if (st.panel || st.help) return;
  if (st.tab === "summary") return;
  if (!ev.touches || ev.touches.length !== 1) return;
  if (ev.target.closest && ev.target.closest(".month-scroll, .memo-chips, .dlist, input, textarea")) return;
  const t = swipeTrackEl();
  if (!t) return;
  drag = {
    x: ev.touches[0].clientX, y: ev.touches[0].clientY,
    dx: 0, mode: "pending",
    w: (t.parentElement && t.parentElement.clientWidth) || window.innerWidth,
    canPrev: periodExists(-1), canNext: periodExists(1),
    lastX: ev.touches[0].clientX, lastT: Date.now(), vx: 0
  };
}, { passive: true });
document.getElementById("mainEl").addEventListener("touchmove", ev => {
  if (!drag) return;
  const tc = ev.touches[0];
  const dx = tc.clientX - drag.x, dy = tc.clientY - drag.y;
  if (drag.mode === "pending") {
    if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
    drag.mode = Math.abs(dx) > Math.abs(dy) ? "h" : "v";
  }
  if (drag.mode !== "h") return;
  ev.preventDefault();
  let d = dx;
  if ((d > 0 && !drag.canPrev) || (d < 0 && !drag.canNext)) d *= 0.3;
  drag.dx = d;
  const now = Date.now();
  drag.vx = (tc.clientX - drag.lastX) / Math.max(1, now - drag.lastT);
  drag.lastX = tc.clientX; drag.lastT = now;
  const t = swipeTrackEl();
  if (t) {
    t.style.transition = "none";
    t.style.transform = "translate3d(calc(-33.3333% + " + d + "px),0,0)";
  }
}, { passive: false });
function endDrag(){
  if (!drag) return;
  const d = drag; drag = null;
  if (d.mode !== "h") return;
  suppressClick = Math.abs(d.dx) > 10;
  const t = swipeTrackEl();
  if (!t) return;
  const commit = d.w * 0.28;
  let dir = 0;
  if ((d.dx <= -commit || (d.vx < -0.45 && d.dx < -24)) && d.canNext) dir = 1;
  else if ((d.dx >= commit || (d.vx > 0.45 && d.dx > 24)) && d.canPrev) dir = -1;
  if (smoothPref() === "auto") {
    if (dir !== 0) applyPeriod(dir);
    else { t.style.transition = "none"; t.style.transform = "translate3d(-33.3333%,0,0)"; }
    return;
  }
  const target = dir === 1 ? "-66.6666%" : dir === -1 ? "0%" : "-33.3333%";
  t.style.transition = "transform 0.26s cubic-bezier(.22,.61,.36,1)";
  requestAnimationFrame(() => { t.style.transform = "translate3d(" + target + ",0,0)"; });
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    if (dir !== 0) applyPeriod(dir);
    else { t.style.transition = "none"; t.style.transform = "translate3d(-33.3333%,0,0)"; }
  };
  t.addEventListener("transitionend", finish, { once: true });
  setTimeout(finish, 380);
}
document.getElementById("mainEl").addEventListener("touchend", endDrag, { passive: true });
document.getElementById("mainEl").addEventListener("touchcancel", () => {
  const t = swipeTrackEl();
  if (drag && drag.mode === "h" && t) {
    t.style.transition = "none";
    t.style.transform = "translate3d(-33.3333%,0,0)";
  }
  drag = null;
}, { passive: true });
document.addEventListener("click", ev => {
  if (suppressClick) {
    suppressClick = false;
    ev.stopPropagation();
    ev.preventDefault();
  }
}, true);

/* ───────── 起動 ───────── */
const ocrFileEl = document.getElementById("ocrFile");
if (ocrFileEl) {
  ocrFileEl.addEventListener("change", ev => {
    const f = ev.target.files && ev.target.files[0];
    ev.target.value = "";
    if (f) runOcr(f);
  });
}
initStorage();
setSaveState(storageOK ? "保存済み" : "この端末では保存不可", storageOK);
renderView();
renderPanel();
renderModal();
renderBanner();

if("serviceWorker" in navigator && location.protocol==="https:"){
  try{ navigator.serviceWorker.register("./sw.js"); }catch(e){ /* noop */ }
}
</script>
